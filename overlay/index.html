<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Stream Control Overlay</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            width: 400px;
            /* Fixed width for sidebar overlay */
            border-radius: 10px;
        }

        h2 {
            margin-top: 0;
            border-bottom: 2px solid #00f3ff;
            padding-bottom: 10px;
        }

        .vote-box {
            background: #222;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }

        .progress-bar {
            background: #444;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            background-color: #00f3ff;
            height: 100%;
            width: 0%;
            transition: width 0.5s;
        }

        .log-box {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            background: #111;
            padding: 10px;
            height: 300px;
            overflow-y: hidden;
            /* Auto scroll */
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px solid #222;
            padding-bottom: 2px;
        }

        .status-active {
            color: #0f0;
        }

        .status-reboot {
            color: #f00;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="vote-box">
        <div>System Status: <span id="status" class="status-active">Active</span></div>
    </div>

    <h2>Command Log</h2>
    <div class="log-box" id="log-box">
        <!-- JS will populate -->
    </div>

    <script>
        async function update() {
            try {
                // Add timestamp to prevent caching
                const response = await fetch('overlay_state.json?' + new Date().getTime());
                const data = await response.json();

                // Update Status
                const statusEl = document.getElementById('status');
                statusEl.textContent = data.status;
                if (data.status.includes("Reboot")) {
                    statusEl.className = "status-reboot";
                } else {
                    statusEl.className = "status-active";
                }


                // Update Log
                const logBox = document.getElementById('log-box');
                logBox.innerHTML = '';
                data.commands.forEach(cmd => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    div.textContent = cmd;
                    logBox.appendChild(div);
                });

            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>

</html>
